<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories | Admin | DeutschPuzzle</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
 
    <div class="admin-layout">
 
        <!-- SIDEBAR -->
        <aside class="admin-sidebar">
            <div class="sidebar-logo">
                <h2>🇩🇪 Admin</h2>
                <span id="adminName"></span>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin/index.html" class="sidebar-link">📊 Dashboard</a>
                <a href="/admin/categories.html" class="sidebar-link active">📁 Categories</a>
                <a href="/admin/words.html" class="sidebar-link">📝 Words</a>
                <a href="/admin/analytics.html" class="sidebar-link">📈 Analytics</a>
                <hr>
                <a href="/dashboard.html" class="sidebar-link">🎮 Player View</a>
                <button onclick="logout()" class="sidebar-logout">🚪 Logout</button>
            </nav>
        </aside>
 
        <!-- MAIN -->
        <main class="admin-main">
            <div class="admin-topbar">
                <h2>Manage Categories</h2>
                <button onclick="openAddModal()" class="btn-primary" style="width:auto;padding:10px 20px;">
                    + Add Category
                </button>
            </div>
 
            <!-- CATEGORIES TABLE -->
            <div class="admin-section">
                <div class="table-wrapper">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Difficulty</th>
                                <th>Grid Size</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="categoriesTable">
                            <tr>
                                <td colspan="7" class="loading-cell">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
 
    <!-- ADD CATEGORY MODAL -->
    <div id="addModal" class="modal hidden">
        <div class="modal-content">
            <h2>Add New Category</h2>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="catName" placeholder="e.g. Food & Drinks">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="catDesc" placeholder="Short description">
            </div>
            <div class="form-group">
                <label>Difficulty</label>
                <select id="catDifficulty">
                    <option value="EASY">Easy</option>
                    <option value="MEDIUM" selected>Medium</option>
                    <option value="HARD">Hard</option>
                </select>
            </div>
            <div class="form-group">
                <label>Grid Size</label>
                <input type="number" id="catGridSize" value="10" min="8" max="15">
            </div>
            <p id="modalError" class="error-text"></p>
            <div style="display:flex;gap:10px;margin-top:16px;">
                <button onclick="submitAddCategory()" class="btn-primary">Save</button>
                <button onclick="closeModal()" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>
 
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/admin.js"></script>
    <script>
        requireAdmin();
        document.getElementById('adminName').textContent = getUser().username;
        loadCategoriesTable();
 
        function openAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
        }
 
        function closeModal() {
            document.getElementById('addModal').classList.add('hidden');
            document.getElementById('modalError').textContent = '';
        }
 
        async function submitAddCategory() {
            const name       = document.getElementById('catName').value.trim();
            const desc       = document.getElementById('catDesc').value.trim();
            const difficulty = document.getElementById('catDifficulty').value;
            const gridSize   = parseInt(document.getElementById('catGridSize').value);
 
            if (!name) {
                document.getElementById('modalError').textContent = 'Name is required';
                return;
            }
 
            await createCategory(name, desc, difficulty, gridSize);
            closeModal();
            loadCategoriesTable();
        }
    </script>
 
</body>
</html>
