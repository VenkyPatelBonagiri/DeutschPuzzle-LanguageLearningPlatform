<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | DeutschPuzzle</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <nav class="navbar">
        <h1>🇩🇪 DeutschPuzzle</h1>
        <div class="nav-links">
            <span id="welcomeUser"></span>
            <a href="/leaderboard.html">Leaderboard</a>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </nav>

    <main class="dashboard-container">

        <!-- Stats Section -->
        <section class="stats-grid">
            <div class="stat-card">
                <h3 id="totalGames">0</h3>
                <p>Total Games</p>
            </div>
            <div class="stat-card">
                <h3 id="completedGames">0</h3>
                <p>Completed</p>
            </div>
            <div class="stat-card">
                <h3 id="totalScore">0</h3>
                <p>Total Score</p>
            </div>
        </section>

        <!-- Categories Section -->
        <section>
            <h2>Choose a Category to Play</h2>
            <div id="categoriesGrid" class="categories-grid">
                <p>Loading categories...</p>
            </div>
        </section>

    </main>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/dashboard.js"></script>

</body>
</html>
